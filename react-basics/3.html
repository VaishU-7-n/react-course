<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
    <style>
        .on-button{
            color: white;
            background-color: green;
            border: 0px;
            border-radius: 12px;
            padding: 12px 20px;
        }
          .off-button{
            color: white;
            background-color: red;
            border: 0px;
            border-radius: 12px;
            padding: 12px 20px;
        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

        function App()
        {
            const [isButtonOn,setIsButtonOn] = React.useState(true);
            function switchButtonOn()
            {
                if(isButtonOn)
                setIsButtonOn(false);
                else
                setIsButtonOn(true);
            }
            return(
                <button
                 className = {isButtonOn?"on-button":"off-button"}
                 onClick={switchButtonOn}>{isButtonOn?"ON":"OFF"}</button>

            );
        }

const container = document.querySelector('.js-container');
ReactDOM.createRoot(container).render(<App></App>);

     
    </script>
  </body>
</html>
