<!DOCTYPE html>
<html>
    <head>

</head>
<body>
    
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

     function ProductDetails({ image,item, price, discountPrice }) {

  const result = discountPrice ? (
    <>
      <img src = {image}  width ="50"></img>
      <del>Price: {price}</del>
      <p>Discount Price: {discountPrice}</p>
    </>
  ) : (
    <>
    <img src = {image}  width ="50"></img>
    <p>Price: {price}</p>
    </>
  );

  return (
    <div>
      <p>{item}</p>
      {result}
      <button>Add to cart</button>
    </div>
  );
}
function App() {
  return (
    <>
      <ProductDetails image = "cotton-socks.png"item="Cotton socks" price="$10.90" discountPrice="$5.45" />
      <ProductDetails image = "tennis-balls.png"item="Tennis balls" price="$15.00" />
      <ProductDetails image = "plain-t-shirt.png"item="Plain T- Shirt" price="$30.00" />
    </>
  );
}
const container = document.querySelector('.js-container');
ReactDOM.createRoot(container).render(<App></App>);

     
    </script>
</body>
</html>
