<!DOCTYPE html>
<html>
  <head>
    <title>Login form</title>
    <style>
        .login-button{
            color: white;
            background-color: rgb(0,123,255);
            border:0px;
            border-radius:10px;
        }
        .sign-button
        {
            color: white;
            background-color: rgb(0,123,255);
            border:0px;
            border-radius:10px;

        }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

      function LoginForm()
      {
        const [showPassword , setPassword] = React.useState(false);
        function changeShowPassword()
        {
            if(showPassword)
            setPassword(false);
            else
            setPassword(true);
        }
        return (
          <>
          <p>Hello, welcome to my website</p>
          <div> <input placeholder = "Email"></input></div>
          <div><input placeholder = "Password" type = {showPassword?"text":"password"}></input> 
          <button onClick={changeShowPassword} >hide</button>
          </div>
          <button className = "login-button">login</button>
          <button className = " sign-button">Sign up</button>
          </>
        );

      }

      function App()
      {
        return <LoginForm></LoginForm>

      }

const container = document.querySelector('.js-container');
ReactDOM.createRoot(container).render(<App></App>);

     
    </script>
  </body>
</html>
